<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>

<body>
    <header>
        <h1>The Heartrate Journal</h1>
        <div id="patientInfo">
            <h2>Name: STACY PHAN</h2>
            <div id="ageHeight">
                <h2>Age: 23</h2>
                <h2>Height: 5' 2"</h2>
            </div>
        </div>
    </header>
    <main>
        <img src="assets/Frame 1.svg" alt="heartbeat line" id="heartbeatLine">
        <div id="timeline">
            <div class="point" style="transform: translate(-10px, 55px);"></div>
            <div class="point" style="transform: translate(-10px, 137px);"></div>
            <div class="point" style="transform: translate(-10px, 148px);"></div>
            <div class="point" style="transform: translate(-10px, 137px);"></div>
            <div class="point" style="transform: translate(0px, 137px);"></div>
            <div class="point" style="transform: translate(5px, 172px);"></div>
            <div class="point" style="transform: translate(7px, 154px);"></div>
            <div class="point" style="transform: translate(9px, 143px);"></div>
            <div class="point" style="transform: translate(12px, -35px);"></div>
            <div class="point" style="transform: translate(11px, -96px);"></div>
            <div class="point" style="transform: translate(13px, -20px);"></div>
            <div class="point" style="transform: translate(17px, -40px);"></div>
            <div class="point" style="transform: translate(24px, -135px);"></div>
            <div class="point" style="transform: translate(23px, -7px);"></div>
            <div class="point" style="transform: translate(23px, 29px);"></div>
            <div class="point" style="transform: translate(30px, -192px);"></div>
            <div class="point" style="transform: translate(34px, -30px);"></div>
            <div class="point" style="transform: translate(39px, 28px);"></div>
            <div class="point" style="transform: translate(34px, -10px);"></div>
            <div class="point" style="transform: translate(40px, -120px);"></div>
            <div class="point" style="transform: translate(39px, -75px);"></div>
            <div class="point" style="transform: translate(49px, -40px);"></div>
            <div class="point" style="transform: translate(50px, 0px);"></div>
            <div class="point" style="transform: translate(54px, 45px);"></div>
            <div style="width: 20px;"></div>
        </div>
        <aside>
            <div id="timeBPM">
                <p id="time">Time: 1:00 AM</p>
                <p id="bpm">BPM: 70</p>
            </div>
            <p id="activity">Activity: Sleeping</p>
        </aside>
    </main>


</body>

</html>
